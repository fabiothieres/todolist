<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>To Do List</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="nav">
      <div class="inputs">
        <label for="titulo">Definir título:</label>
        <div>
          <input type="text" id="titulo" />
          <button class="def">Definir</button>
        </div>
      </div>

      <h1>To do list</h1>

      <div class="inputs">
        <label for="data">Definir data:</label>
        <input type="date" name="data" id="data" />
      </div>
    </div>

    <div class="criar">
      <label>Criar tarefa: </label>
      <div>
        <input type="text" class="input-tarefa" />
        <button class="btn-tarefa">Criar</button>
      </div>
      <div class="color">
        <label for="cor">Mudar cor do tema:</label>
        <input type="color" name="cor" id="cor" />
      </div>
    </div>

    <section class="caderno">
      <div class="tit-data">
        <h2 id="tit-definido">Título</h2>
        <div>
          <h3>Data:</h3>
          <p class="dataDef">dd/mm/aaaa</p>
        </div>
      </div>
      <ul class="tarefas"></ul>
    </section>

    <script src="js/main.js"></script>
  </body>
</html>
